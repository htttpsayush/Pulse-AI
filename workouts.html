<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI — Workouts</title>
    <meta name="description" content="Manage your workouts and generate AI-powered training plans.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .workout-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 18px;
            background: var(--card2);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }
        .workout-item:hover { background: rgba(255,255,255,0.04); }
        .workout-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }
        .workout-check {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: 2px solid var(--text-dim);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            font-size: 13px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        .workout-check.checked {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }
        .workout-item.completed .workout-name {
            text-decoration: line-through;
            color: var(--text-dim);
        }
        .workout-name { font-size: 14px; font-weight: 500; }
        .workout-detail { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .workout-delete {
            background: none; border: none; color: var(--danger);
            font-size: 18px; cursor: pointer; padding: 6px; opacity: 0.6;
            transition: opacity 0.2s;
        }
        .workout-delete:hover { opacity: 1; }

        .add-workout-form {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .add-workout-form input {
            flex: 1;
            min-width: 150px;
        }

        /* AI Section */
        .ai-section {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
        }
        .ai-section h2 {
            font-size: 20px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ai-section h2 i { color: var(--accent); }
        .ai-section .ai-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .ai-form {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .day-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }
        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .day-header:hover { background: var(--card2); }
        .day-header h4 { font-size: 15px; }
        .day-header i {
            color: var(--text-secondary);
            transition: transform 0.3s;
        }
        .day-header.open i { transform: rotate(180deg); }
        .day-body {
            display: none;
            padding: 0 18px 16px;
        }
        .day-body.open { display: block; }
        .exercise-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .exercise-item:last-child { border-bottom: none; }
        .exercise-item i { color: var(--accent); font-size: 16px; }
        .exercise-detail { color: var(--text-secondary); margin-left: auto; font-size: 13px; }

        .add-day-btn {
            margin-top: 10px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .add-workout-form { flex-direction: column; }
            .ai-form { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .ai-form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon"><i class="ri-pulse-fill"></i></div>
        <div class="logo-text">Pulse<span>AI</span></div>
    </div>
    <div class="user-profile">
        <div class="avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
            <h2 id="sidebar-username">User</h2>
            <span class="role">Member</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="ri-dashboard-fill"></i> Dashboard</a>
        <a href="workouts.html" class="nav-item active"><i class="ri-run-fill"></i> Workouts</a>
        <a href="modules.html" class="nav-item"><i class="ri-robot-2-fill"></i> Modules</a>
        <a href="settings.html" class="nav-item"><i class="ri-settings-4-fill"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
        <button class="nav-item logout-btn" onclick="logout()">
            <i class="ri-logout-box-r-line"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <h1 class="page-title">Workouts</h1>

    <!-- ADD FORM -->
    <form class="add-workout-form" id="add-form" onsubmit="addWorkout(event)">
        <input type="text" class="form-input" id="w-name" placeholder="Workout name" required>
        <input type="text" class="form-input" id="w-detail" placeholder="Detail (e.g. 3x15 reps)" required>
        <button type="submit" class="btn btn-primary" id="add-btn">
            <i class="ri-add-line"></i> Add
        </button>
    </form>

    <!-- WORKOUT LIST -->
    <div id="workout-list">
        <div class="empty-state">
            <i class="ri-dumbbell-line"></i>
            <p>No workouts yet. Add one above!</p>
        </div>
    </div>

    <!-- AI PLAN -->
    <div class="ai-section">
        <h2><i class="ri-sparkling-2-fill"></i> AI Workout Plan</h2>
        <p class="ai-desc">Generate a personalized workout plan powered by AI.</p>

        <div class="ai-form" id="ai-form">
            <div class="form-group">
                <label>Age</label>
                <input type="number" class="form-input" id="ai-age" placeholder="25" min="10" max="80" required>
            </div>
            <div class="form-group">
                <label>Weight (kg)</label>
                <input type="number" class="form-input" id="ai-weight" placeholder="70" min="30" max="200" required>
            </div>
            <div class="form-group">
                <label>Height (cm)</label>
                <input type="number" class="form-input" id="ai-height" placeholder="175" min="100" max="250" required>
            </div>
            <div class="form-group">
                <label>Goal</label>
                <select class="form-select" id="ai-goal">
                    <option value="weight loss">Weight Loss</option>
                    <option value="muscle gain">Muscle Gain</option>
                    <option value="general fitness">General Fitness</option>
                    <option value="endurance">Endurance</option>
                    <option value="flexibility">Flexibility</option>
                </select>
            </div>
            <div class="form-group">
                <label>Fitness Level</label>
                <select class="form-select" id="ai-level">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            <div class="form-group">
                <label>Diet</label>
                <select class="form-select" id="ai-diet">
                    <option value="balanced">Balanced</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                    <option value="keto">Keto</option>
                    <option value="high protein">High Protein</option>
                </select>
            </div>
            <div class="form-group">
                <label>Days</label>
                <select class="form-select" id="ai-days">
                    <option value="3">3 Days</option>
                    <option value="5" selected>5 Days</option>
                    <option value="7">7 Days</option>
                    <option value="custom">Custom</option>
                </select>
            </div>
            <div class="form-group" id="custom-days-group" style="display:none;">
                <label>Custom Days</label>
                <input type="number" class="form-input" id="ai-days-custom" placeholder="Enter days (1-30)" min="1" max="30">
            </div>
        </div>
        <button class="btn btn-primary" id="generate-btn" onclick="generatePlan()">
            <i class="ri-sparkling-2-fill"></i> Generate Plan
        </button>

        <div id="ai-results" style="margin-top: 24px;"></div>
    </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="index.html"><i class="ri-dashboard-fill"></i> Dashboard</a>
    <a href="workouts.html" class="active"><i class="ri-run-fill"></i> Workouts</a>
    <a href="modules.html"><i class="ri-robot-2-fill"></i> Modules</a>
    <a href="settings.html"><i class="ri-settings-4-fill"></i> Settings</a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:8000'
    : 'https://pulseai-backend-9yj2.onrender.com';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'auth.html';

function showToast(msg, type='error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { localStorage.removeItem('token'); window.location.href = 'auth.html'; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Load User ──────────────────────────────────────────
fetch(`${API}/users/me`, { headers: { 'Authorization': `Bearer ${token}` }})
.then(r => { if (!r.ok) { localStorage.removeItem('token'); window.location.href = 'auth.html'; throw new Error('unauthorized'); } return r.json(); })
.then(user => {
    document.getElementById('sidebar-username').textContent = user.name;
    document.getElementById('sidebar-avatar').textContent = user.name.charAt(0).toUpperCase();
});

// ─── Load Workouts ──────────────────────────────────────
async function loadWorkouts() {
    const res = await fetch(`${API}/workouts/`, { headers: { 'Authorization': `Bearer ${token}` }});
    if (!res.ok) return;
    const workouts = await res.json();
    const list = document.getElementById('workout-list');
    if (workouts.length === 0) {
        list.innerHTML = '<div class="empty-state"><i class="ri-dumbbell-line"></i><p>No workouts yet. Add one above!</p></div>';
        return;
    }
    list.innerHTML = workouts.map(w => `
        <div class="workout-item ${w.is_completed ? 'completed' : ''}">
            <div class="workout-left">
                <button class="workout-check ${w.is_completed ? 'checked' : ''}" onclick="toggleWorkout(${w.id})">
                    <i class="ri-check-line"></i>
                </button>
                <div>
                    <div class="workout-name">${escapeHtml(w.name)}</div>
                    <div class="workout-detail">${escapeHtml(w.detail)}</div>
                </div>
            </div>
            <button class="workout-delete" onclick="deleteWorkout(${w.id})"><i class="ri-delete-bin-6-line"></i></button>
        </div>
    `).join('');
}
loadWorkouts();

async function addWorkout(e) {
    e.preventDefault();
    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';
    try {
        const res = await fetch(`${API}/workouts/`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('w-name').value,
                detail: document.getElementById('w-detail').value
            })
        });
        if (!res.ok) throw new Error('Failed to add workout');
        document.getElementById('w-name').value = '';
        document.getElementById('w-detail').value = '';
        showToast('Workout added!', 'success');
        loadWorkouts();
    } catch (err) {
        showToast(err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-add-line"></i> Add';
    }
}

async function toggleWorkout(id) {
    await fetch(`${API}/workouts/${id}`, { method: 'PATCH', headers: { 'Authorization': `Bearer ${token}` }});
    loadWorkouts();
}

async function deleteWorkout(id) {
    if (!confirm('Delete this workout?')) return;
    await fetch(`${API}/workouts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }});
    showToast('Workout deleted', 'info');
    loadWorkouts();
}

// ─── Custom Days Toggle ─────────────────────────────────
const daysSelect = document.getElementById('ai-days');
const customDaysGroup = document.getElementById('custom-days-group');

daysSelect.addEventListener('change', function() {
    customDaysGroup.style.display = this.value === 'custom' ? '' : 'none';
});

// ─── AI Plan ────────────────────────────────────────────
async function generatePlan() {
    const btn = document.getElementById('generate-btn');

    // Resolve days value
    let days;
    if (daysSelect.value === 'custom') {
        const customInput = document.getElementById('ai-days-custom');
        days = parseInt(customInput.value);
        if (isNaN(days) || days < 1 || days > 30) {
            showToast('Please enter a valid number of days (1-30)');
            return;
        }
    } else {
        days = parseInt(daysSelect.value);
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Generating...';
    try {
        const body = {
            age: parseInt(document.getElementById('ai-age').value) || 25,
            weight: parseFloat(document.getElementById('ai-weight').value) || 70,
            height: parseFloat(document.getElementById('ai-height').value) || 175,
            goal: document.getElementById('ai-goal').value,
            level: document.getElementById('ai-level').value,
            diet: document.getElementById('ai-diet').value,
            days: days
        };
        const res = await fetch(`${API}/workouts/generate-plan`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('AI generation failed');
        const data = await res.json();
        renderPlan(data.plan);
        showToast('Plan generated!', 'success');
    } catch (err) {
        showToast(err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-sparkling-2-fill"></i> Generate Plan';
    }
}

function renderPlan(plan) {
    const container = document.getElementById('ai-results');
    container.innerHTML = `
        <button class="btn btn-primary" id="add-all-btn" onclick="addAllPlanWorkouts()" style="width:100%;margin-bottom:18px;">
            <i class="ri-download-2-line"></i> Add All to My Workouts
        </button>
    ` + plan.map((day, i) => `
        <div class="day-card">
            <div class="day-header" onclick="toggleDay(this)">
                <h4>${escapeHtml(day.day)}</h4>
                <i class="ri-arrow-down-s-line"></i>
            </div>
            <div class="day-body">
                ${day.exercises.map(ex => `
                    <div class="exercise-item">
                        <i class="ri-checkbox-blank-circle-fill"></i>
                        <span>${escapeHtml(ex.name)}</span>
                        <span class="exercise-detail">${escapeHtml(ex.detail)}</span>
                    </div>
                `).join('')}
                <button class="btn btn-secondary btn-sm add-day-btn" onclick="addDayWorkouts(${i})">
                    <i class="ri-add-line"></i> Add to My Workouts
                </button>
            </div>
        </div>
    `).join('');
    // Open first day by default
    const first = container.querySelector('.day-header');
    if (first) toggleDay(first);

    // Store plan globally for add function
    window._generatedPlan = plan;
}

function toggleDay(header) {
    header.classList.toggle('open');
    header.nextElementSibling.classList.toggle('open');
}

async function addDayWorkouts(dayIndex) {
    const day = window._generatedPlan[dayIndex];
    for (const ex of day.exercises) {
        await fetch(`${API}/workouts/`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: ex.name, detail: ex.detail })
        });
    }
    showToast(`${day.day} workouts added!`, 'success');
    loadWorkouts();
}

async function addAllPlanWorkouts() {
    const plan = window._generatedPlan;
    if (!plan || plan.length === 0) return;

    const btn = document.getElementById('add-all-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';

    try {
        for (let i = 0; i < plan.length; i++) {
            const day = plan[i];
            const detail = day.exercises.map(ex => `${ex.name} — ${ex.detail}`).join(', ');
            await fetch(`${API}/workouts/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: `${day.day} - AI Plan`,
                    detail: detail
                })
            });
        }
        showToast('Workout plan saved! Check your workouts.', 'success');
        loadWorkouts();
    } catch (err) {
        showToast('Failed to save plan: ' + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-download-2-line"></i> Add All to My Workouts';
    }
}
</script>
</body>
</html>
