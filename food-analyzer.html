<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI — Food Analyzer</title>
    <meta name="description" content="AI-powered food analysis. Upload a photo or enter foods to get detailed nutrition data.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="index.css">
    <style>
        .analyzer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card);
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .upload-zone i {
            font-size: 48px;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
        }
        .upload-zone p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .upload-zone .browse {
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }
        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-container {
            display: none;
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
        }
        .preview-container img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
        }
        .preview-remove {
            position: absolute;
            top: 10px; right: 10px;
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Portion */
        .portion-selector {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        .portion-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius-sm);
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .portion-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* Manual Foods */
        .manual-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .manual-input-row input { flex: 1; }
        .food-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
            min-height: 20px;
        }

        /* Results */
        .results-section {
            display: none;
            margin-top: 32px;
        }
        .results-section.show { display: block; }

        .detected-foods {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }
        .nutrition-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 18px 14px;
            text-align: center;
        }
        .nutrition-card .n-value {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .nutrition-card .n-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .nutrition-card.cal .n-value { color: var(--accent); }
        .nutrition-card.pro .n-value { color: #60A5FA; }
        .nutrition-card.fat .n-value { color: #F472B6; }
        .nutrition-card.carb .n-value { color: #34D399; }

        .insights-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 18px;
            margin-bottom: 24px;
        }
        .insights-box h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }
        .insight-item {
            font-size: 14px;
            padding: 6px 0;
        }

        .history-chart {
            height: 240px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .analyzer-grid { grid-template-columns: 1fr; }
            .nutrition-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon"><i class="ri-pulse-fill"></i></div>
        <div class="logo-text">Pulse<span>AI</span></div>
    </div>
    <div class="user-profile">
        <div class="avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
            <h2 id="sidebar-username">User</h2>
            <span class="role">Member</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="ri-dashboard-fill"></i> Dashboard</a>
        <a href="workouts.html" class="nav-item"><i class="ri-run-fill"></i> Workouts</a>
        <a href="modules.html" class="nav-item active"><i class="ri-robot-2-fill"></i> Modules</a>
        <a href="settings.html" class="nav-item"><i class="ri-settings-4-fill"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
        <button class="nav-item logout-btn" onclick="logout()">
            <i class="ri-logout-box-r-line"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <h1 class="page-title">Food Analyzer</h1>

    <div class="analyzer-grid">
        <!-- LEFT: Upload + Controls -->
        <div>
            <!-- Upload -->
            <div class="upload-zone" id="upload-zone">
                <i class="ri-camera-lens-fill"></i>
                <p>Drag & drop a food image or <span class="browse">browse</span></p>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <div class="preview-container" id="preview-container">
                <img id="preview-img" src="" alt="Food preview">
                <button class="preview-remove" onclick="removeImage()"><i class="ri-close-line"></i></button>
            </div>

            <!-- Portion -->
            <div class="portion-selector">
                <button class="portion-btn" onclick="setPortion('small', this)">🥄 Small</button>
                <button class="portion-btn active" onclick="setPortion('medium', this)">🍽️ Medium</button>
                <button class="portion-btn" onclick="setPortion('large', this)">🥘 Large</button>
            </div>

            <!-- Manual Foods -->
            <label style="font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px;">Or add foods manually:</label>
            <div class="manual-input-row">
                <input type="text" class="form-input" id="manual-food" placeholder="e.g. rice, dal">
                <button class="btn btn-secondary btn-sm" onclick="addManualFood()">Add</button>
            </div>
            <div class="food-tags" id="food-tags"></div>

            <!-- Diet Type -->
            <div class="form-group" style="margin-bottom: 12px;">
                <label style="font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px;">Diet Type</label>
                <select class="form-select" id="diet-type">
                    <option value="all" selected>All</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                    <option value="non-vegetarian">Non-Vegetarian</option>
                </select>
            </div>

            <!-- Analyze Button -->
            <button class="btn btn-primary" id="analyze-btn" onclick="analyzeFood()" style="width: 100%;">
                <i class="ri-search-eye-line"></i> Analyze
            </button>
        </div>

        <!-- RIGHT: History -->
        <div>
            <div class="card">
                <div class="card-header">
                    <h3>7-Day Calorie History</h3>
                </div>
                <div class="history-chart">
                    <canvas id="history-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div class="results-section" id="results-section">
        <h2 class="page-title" style="font-size: 18px; margin-top: 16px;">Analysis Results</h2>

        <div class="detected-foods" id="detected-foods"></div>

        <div class="nutrition-grid" id="nutrition-grid">
            <div class="nutrition-card cal">
                <div class="n-value" id="res-cal">0</div>
                <div class="n-label">Calories</div>
            </div>
            <div class="nutrition-card pro">
                <div class="n-value" id="res-pro">0g</div>
                <div class="n-label">Protein</div>
            </div>
            <div class="nutrition-card fat">
                <div class="n-value" id="res-fat">0g</div>
                <div class="n-label">Fats</div>
            </div>
            <div class="nutrition-card carb">
                <div class="n-value" id="res-carb">0g</div>
                <div class="n-label">Carbs</div>
            </div>
        </div>

        <div class="insights-box" id="insights-box">
            <h4><i class="ri-lightbulb-flash-line"></i> Insights</h4>
            <div id="insights-list"></div>
        </div>
    </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="index.html"><i class="ri-dashboard-fill"></i> Dashboard</a>
    <a href="workouts.html"><i class="ri-run-fill"></i> Workouts</a>
    <a href="modules.html" class="active"><i class="ri-robot-2-fill"></i> Modules</a>
    <a href="settings.html"><i class="ri-settings-4-fill"></i> Settings</a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:8000'
    : 'https://pulseai-backend-1-fexf.onrender.com';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'auth.html';

function showToast(msg, type='error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { localStorage.removeItem('token'); window.location.href = 'auth.html'; }

// Load user
fetch(`${API}/users/me`, { headers: { 'Authorization': `Bearer ${token}` }})
.then(r => { if (!r.ok) { localStorage.removeItem('token'); window.location.href = 'auth.html'; throw new Error('unauthorized'); } return r.json(); })
.then(user => {
    document.getElementById('sidebar-username').textContent = user.name;
    document.getElementById('sidebar-avatar').textContent = user.name.charAt(0).toUpperCase();
});

// ─── Image Handling ─────────────────────────────────────
let selectedFile = null;

const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
const previewContainer = document.getElementById('preview-container');
const previewImg = document.getElementById('preview-img');

fileInput.addEventListener('change', e => {
    if (e.target.files[0]) showPreview(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
});

function showPreview(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        uploadZone.style.display = 'none';
        previewContainer.style.display = 'block';
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    selectedFile = null;
    fileInput.value = '';
    previewContainer.style.display = 'none';
    uploadZone.style.display = 'block';
}

// ─── Portion ────────────────────────────────────────────
let portion = 'medium';
function setPortion(val, btn) {
    portion = val;
    document.querySelectorAll('.portion-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ─── Manual Foods ───────────────────────────────────────
let manualFoods = [];

function addManualFood() {
    const input = document.getElementById('manual-food');
    const val = input.value.trim();
    if (!val) return;
    // Support comma-separated
    val.split(',').forEach(f => {
        const food = f.trim();
        if (food && !manualFoods.includes(food)) manualFoods.push(food);
    });
    input.value = '';
    renderFoodTags();
}

document.getElementById('manual-food').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addManualFood(); }
});

function removeFood(food) {
    manualFoods = manualFoods.filter(f => f !== food);
    renderFoodTags();
}

function renderFoodTags() {
    const container = document.getElementById('food-tags');
    container.innerHTML = manualFoods.map(f =>
        `<span class="tag">${f} <span class="tag-remove" onclick="removeFood('${f}')">×</span></span>`
    ).join('');
}

// ─── Analyze ────────────────────────────────────────────
async function analyzeFood() {
    if (!selectedFile && manualFoods.length === 0) {
        showToast('Upload an image or add foods manually');
        return;
    }

    const btn = document.getElementById('analyze-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';

    const dietType = document.getElementById('diet-type').value;

    const formData = new FormData();
    formData.append('portion', portion);
    formData.append('diet_type', dietType);
    if (selectedFile) formData.append('image', selectedFile);
    if (manualFoods.length > 0) formData.append('manual_foods', JSON.stringify(manualFoods));

    try {
        const res = await fetch(`${API}/api/meal/analyze`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Analysis failed');
        }
        const data = await res.json();
        showResults(data);
        showToast('Analysis complete!', 'success');
        loadHistory(); // refresh chart
    } catch (err) {
        showToast(err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ri-search-eye-line"></i> Analyze';
    }
}

function showResults(data) {
    const section = document.getElementById('results-section');
    section.classList.add('show');

    // Detected foods
    const foodsEl = document.getElementById('detected-foods');
    foodsEl.innerHTML = (data.food_items || []).map(f =>
        `<span class="tag">${f.name}</span>`
    ).join('');

    // Nutrition
    document.getElementById('res-cal').textContent = Math.round(data.total.calories);
    document.getElementById('res-pro').textContent = Math.round(data.total.protein) + 'g';
    document.getElementById('res-fat').textContent = Math.round(data.total.fats) + 'g';
    document.getElementById('res-carb').textContent = Math.round(data.total.carbs) + 'g';

    // Insights
    document.getElementById('insights-list').innerHTML = (data.insights || []).map(i =>
        `<div class="insight-item">${i}</div>`
    ).join('');

    section.scrollIntoView({ behavior: 'smooth' });
}

// ─── History Chart ──────────────────────────────────────
let historyChart = null;

async function loadHistory() {
    try {
        const res = await fetch(`${API}/api/meal/history`, { headers: { 'Authorization': `Bearer ${token}` }});
        if (!res.ok) return;
        const data = await res.json();
        const history = data.history || [];

        const labels = [];
        const values = [];

        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            labels.push(d.toLocaleDateString('en-US', { weekday: 'short' }));
            const entry = history.find(h => h.date === dateStr);
            values.push(entry ? Math.round(entry.total_calories) : 0);
        }

        const ctx = document.getElementById('history-chart').getContext('2d');
        if (historyChart) historyChart.destroy();

        historyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: 'Calories',
                    data: values,
                    backgroundColor: 'rgba(245,197,24,0.3)',
                    borderColor: '#F5C518',
                    borderWidth: 1,
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: { color: '#777', font: { size: 12 } }
                    },
                    y: {
                        grid: { color: 'rgba(255,255,255,0.04)' },
                        ticks: { color: '#777', font: { size: 12 } },
                        beginAtZero: true
                    }
                }
            }
        });
    } catch (err) {
        console.error(err);
    }
}
loadHistory();

// ─── Weekly Eating Pattern ──────────────────────────────
async function loadAnalytics() {
    try {
        const res = await fetch(`${API}/api/meal/analytics`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) return;
        const data = await res.json();

        // Create insight card below the chart
        const chartCard = document.querySelector('.chart-card') || document.getElementById('history-chart')?.closest('.card');
        if (!chartCard) return;

        // Remove old insight if exists
        const old = document.getElementById('eating-pattern-insight');
        if (old) old.remove();

        const insightEl = document.createElement('div');
        insightEl.id = 'eating-pattern-insight';
        insightEl.style.cssText = 'margin-top:16px;padding:14px 18px;background:var(--card2);border-radius:10px;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:10px;';
        insightEl.innerHTML = `
            <i class="ri-bar-chart-grouped-line" style="font-size:20px;color:var(--accent);"></i>
            <span>${data.insight}</span>
        `;
        chartCard.appendChild(insightEl);
    } catch (err) {
        console.error('Analytics error:', err);
    }
}
loadAnalytics();
</script>
</body>
</html>
