<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI — Login</title>
    <meta name="description" content="Sign in to PulseAI — your AI-powered fitness companion.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --accent: #F5C518;
            --accent-dim: rgba(245,197,24,0.12);
            --accent-glow: rgba(245,197,24,0.25);
            --bg: #0C0C0C;
            --card: #141414;
            --card2: #1A1A1A;
            --border: rgba(255,255,255,0.07);
            --text: #FFFFFF;
            --text-secondary: #777;
            --text-dim: #444;
            --danger: #FF5A5A;
            --success: #4ADE80;
            --radius: 16px;
            --radius-sm: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .auth-logo .logo-icon {
            width: 42px; height: 42px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .auth-logo h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .auth-logo h1 span { color: var(--accent); }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 28px;
        }

        .tab-switcher {
            display: flex;
            background: var(--card2);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-switcher button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }
        .tab-switcher button.active {
            background: var(--accent);
            color: #000;
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-wrap {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 13px 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .form-input:focus { border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-dim); }

        .eye-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 2px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .submit-btn:hover:not(:disabled) { background: #e0b416; transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0;
            color: var(--text-dim);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .google-btn:hover { border-color: var(--accent); }
        .google-btn img {
            width: 18px; height: 18px;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
        .toast.error { background: var(--danger); color: #fff; }
        .toast.success { background: var(--success); color: #000; }

        .password-hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .auth-card { padding: 24px 20px; }
            .auth-logo { margin-bottom: 28px; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-logo">
        <div class="logo-icon"><i class="ri-pulse-fill"></i></div>
        <h1>Pulse<span>AI</span></h1>
    </div>

    <div class="auth-card">
        <div class="tab-switcher">
            <button class="active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" class="form-input" id="login-password" placeholder="Enter password" required>
                    <button type="button" class="eye-toggle" onclick="toggleEye('login-password', this)">
                        <i class="ri-eye-off-line"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">
                <span>Login</span>
            </button>
            <div class="divider">or</div>
            <button type="button" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                Continue with Google
            </button>
        </form>

        <!-- SIGNUP FORM -->
        <form class="auth-form" id="form-signup" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-input" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" class="form-input" id="signup-password" placeholder="Min 8 characters" minlength="8" required>
                    <button type="button" class="eye-toggle" onclick="toggleEye('signup-password', this)">
                        <i class="ri-eye-off-line"></i>
                    </button>
                </div>
                <p class="password-hint">Must be at least 8 characters</p>
            </div>
            <button type="submit" class="submit-btn" id="signup-btn">
                <span>Create Account</span>
            </button>
            <div class="divider">or</div>
            <button type="button" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
                Continue with Google
            </button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:8000'
    : 'https://pulseai-backend-9yj2.onrender.com';

// If already logged in, redirect
if (localStorage.getItem('token')) {
    window.location.href = 'index.html';
}

function showToast(msg, type = 'error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
}

function toggleEye(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'ri-eye-line';
    } else {
        input.type = 'password';
        icon.className = 'ri-eye-off-line';
    }
}

function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
    } else {
        btn.disabled = false;
        btn.innerHTML = `<span>${btnId === 'login-btn' ? 'Login' : 'Create Account'}</span>`;
    }
}

async function handleLogin(e) {
    e.preventDefault();
    setLoading('login-btn', true);
    try {
        const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Invalid credentials');
        localStorage.setItem('token', data.access_token);
        window.location.href = 'index.html';
    } catch (err) {
        showToast(err.message);
    } finally {
        setLoading('login-btn', false);
    }
}

async function handleSignup(e) {
    e.preventDefault();
    const pw = document.getElementById('signup-password').value;
    if (pw.length < 8) { showToast('Password must be at least 8 characters'); return; }
    setLoading('signup-btn', true);
    try {
        const res = await fetch(`${API}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('signup-name').value,
                email: document.getElementById('signup-email').value,
                password: pw
            })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Signup failed');
        showToast('Account created! Please login.', 'success');
        switchTab('login');
    } catch (err) {
        showToast(err.message);
    } finally {
        setLoading('signup-btn', false);
    }
}

// Enter key support
document.querySelectorAll('.auth-form').forEach(form => {
    form.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            e.preventDefault();
            form.querySelector('.submit-btn').click();
        }
    });
});
</script>
</body>
</html>
