<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAI — Admin Panel</title>
    <meta name="description" content="PulseAI admin panel — manage users and platform settings.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .admin-header .user-count {
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--card);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .users-table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: var(--card2);
        }
        th {
            padding: 14px 18px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 14px 18px;
            font-size: 14px;
            border-top: 1px solid var(--border);
        }
        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .role-cell {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .role-cell.admin {
            background: rgba(139, 92, 246, 0.15);
            color: #8B5CF6;
        }
        .role-cell.user {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .delete-user-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 18px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            opacity: 0.6;
            transition: all 0.2s;
        }
        .delete-user-btn:hover {
            opacity: 1;
            background: rgba(255, 90, 90, 0.1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        @media (max-width: 768px) {
            th, td { padding: 10px 12px; font-size: 13px; }
            .admin-header { flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-icon"><i class="ri-pulse-fill"></i></div>
        <div class="logo-text">Pulse<span>AI</span></div>
    </div>
    <div class="user-profile">
        <div class="avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
            <h2 id="sidebar-username">User</h2>
            <span class="role">Admin</span>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><i class="ri-dashboard-fill"></i> Dashboard</a>
        <a href="workouts.html" class="nav-item"><i class="ri-run-fill"></i> Workouts</a>
        <a href="modules.html" class="nav-item"><i class="ri-robot-2-fill"></i> Modules</a>
        <a href="settings.html" class="nav-item"><i class="ri-settings-4-fill"></i> Settings</a>
    </nav>
    <div class="sidebar-footer">
        <button class="nav-item logout-btn" onclick="logout()">
            <i class="ri-logout-box-r-line"></i> Logout
        </button>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <a href="index.html" class="back-link"><i class="ri-arrow-left-line"></i> Back to Dashboard</a>

    <div class="admin-header">
        <h1 class="page-title" style="margin-bottom: 0;">Admin Panel</h1>
        <div class="user-count" id="user-count">Loading...</div>
    </div>

    <div class="users-table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr>
                    <td colspan="5" style="text-align: center; padding: 32px; color: var(--text-secondary);">
                        <span class="spinner" style="color: var(--accent);"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="index.html"><i class="ri-dashboard-fill"></i> Dashboard</a>
    <a href="workouts.html"><i class="ri-run-fill"></i> Workouts</a>
    <a href="modules.html"><i class="ri-robot-2-fill"></i> Modules</a>
    <a href="settings.html"><i class="ri-settings-4-fill"></i> Settings</a>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
    ? 'http://127.0.0.1:8000'
    : 'https://pulseai-backend-9yj2.onrender.com';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'auth.html';

function showToast(msg, type='error') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
}
function logout() { localStorage.removeItem('token'); window.location.href = 'auth.html'; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Verify Admin ───────────────────────────────────────
fetch(`${API}/users/me`, { headers: { 'Authorization': `Bearer ${token}` }})
.then(r => { if (!r.ok) { localStorage.removeItem('token'); window.location.href = 'auth.html'; } return r.json(); })
.then(user => {
    if (user.role !== 'admin') {
        window.location.href = 'index.html';
        return;
    }
    document.getElementById('sidebar-username').textContent = user.name;
    document.getElementById('sidebar-avatar').textContent = user.name.charAt(0).toUpperCase();
    loadUsers();
});

// ─── Load Users ─────────────────────────────────────────
async function loadUsers() {
    try {
        const res = await fetch(`${API}/users/all`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load users');
        const users = await res.json();

        document.getElementById('user-count').textContent = `${users.length} users`;

        const tbody = document.getElementById('users-tbody');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:32px; color:var(--text-secondary);">No users found</td></tr>';
            return;
        }

        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${escapeHtml(u.name)}</td>
                <td>${escapeHtml(u.email)}</td>
                <td><span class="role-cell ${u.role}">${u.role}</span></td>
                <td>
                    <button class="delete-user-btn" onclick="deleteUser(${u.id}, '${escapeHtml(u.name)}')" title="Delete user">
                        <i class="ri-delete-bin-6-line"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (err) {
        showToast(err.message);
    }
}

async function deleteUser(userId, name) {
    if (!confirm(`Delete user "${name}" (ID: ${userId})?`)) return;
    try {
        const res = await fetch(`${API}/users/${userId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to delete user');
        showToast(`User "${name}" deleted`, 'success');
        loadUsers();
    } catch (err) {
        showToast(err.message);
    }
}
</script>
</body>
</html>
